name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run tests
        run: pytest -q --tb=short

      - name: Smoke-test package import
        run: |
          python -c "
          from shipit_agent import Agent, ToolSearchTool
          from shipit_agent.llms import (
              OpenAIChatLLM, AnthropicChatLLM, BedrockChatLLM,
              GeminiChatLLM, VertexAIChatLLM, GroqChatLLM,
              TogetherChatLLM, OllamaChatLLM, LiteLLMChatLLM,
              LiteLLMProxyChatLLM, SimpleEchoLLM,
          )
          print('All adapters importable')
          tool = ToolSearchTool()
          assert 'limit' in tool.schema()['function']['parameters']['properties']
          print('ToolSearchTool schema has limit field')
          "
