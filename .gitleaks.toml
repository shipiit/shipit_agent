# gitleaks config for shipit-agent
#
# Extends the default gitleaks rule set with shipit-specific allowlists.
# See: https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml
#
# Run locally:
#     brew install gitleaks
#     gitleaks detect --config=.gitleaks.toml --source=. --verbose --redact

[extend]
useDefault = true

[allowlist]
description = "shipit-agent allowlist"

# Files that legitimately contain token-like strings
paths = [
    # Examples and docs — placeholder tokens only
    '''\.env\.example$''',
    '''docs/getting-started/environment\.md$''',

    # Notebooks may contain stub credentials in markdown cells
    '''notebooks/.*\.ipynb$''',

    # Test fixtures — may include fake tokens for assertion
    '''tests/.*''',

    # --- Runtime tool-output artifacts ---
    # These directories store scraped web content, tool results, and session
    # state from agent runs. They can contain anything the agent fetched
    # (including public client-side tokens from scraped pages like Pushly
    # domainKeys, Google Analytics IDs, etc.) but never real credentials
    # belonging to the shipit-agent user. They're gitignored for future
    # commits but may appear in git history from before being ignored.
    '''\.shipit_notebooks/.*''',
    '''\.shipit_workspace/.*''',
    '''\.shipit_notebook_workspace/.*''',

    # Session and trace stores (FileSessionStore, FileTraceStore, FileMemoryStore)
    '''^sessions/.*''',
    '''^traces/.*''',
    '''memory\.json$''',

    # Build artifacts — may contain source lines that look like tokens
    '''^dist/.*''',
    '''^build/.*''',
    '''^site/.*''',
    '''\.egg-info/.*''',
]

# Allow obvious placeholder patterns used in docs and examples
regexes = [
    '''sk-\.\.\.''',
    '''sk-ant-\.\.\.''',
    '''AKIA[A-Z0-9]{0,4}\.\.\.''',
    '''REPLACE_ME[_A-Z]*''',
    '''PASTE[_A-Z]*''',
    '''<REDACTED>''',
    '''your[_-]?api[_-]?key[_-]?here''',
    '''example[_-]?token''',

    # Pushly / Google Analytics / Segment / Mixpanel client-side IDs that
    # frequently appear in scraped HTML. These are public by design.
    '''pushly\(['"]load['"]''',
    '''UA-[0-9]+-[0-9]+''',        # Legacy GA tracking IDs
    '''G-[A-Z0-9]{10}''',          # GA4 measurement IDs
    '''GTM-[A-Z0-9]+''',           # Google Tag Manager
]
