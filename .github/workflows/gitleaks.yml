name: Secret scan

# Scans every push and PR for leaked secrets using the gitleaks CLI binary
# directly. We intentionally avoid `gitleaks/gitleaks-action@v2` because it
# now requires a paid license. The CLI is open-source and free.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: gitleaks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history — gitleaks scans the entire git log

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.21.2
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks (detect mode — full history + staged changes)
        run: |
          gitleaks detect \
            --config=.gitleaks.toml \
            --source=. \
            --verbose \
            --redact \
            --exit-code=1 \
            --report-format=sarif \
            --report-path=gitleaks-report.sarif

      - name: Upload SARIF report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.sarif
          retention-days: 7
