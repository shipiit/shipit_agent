site_name: SHIPIT Agent
site_description: A clean, powerful Python agent library with tools, MCP, streaming events, reasoning capture, and runtime policies.
site_url: https://docs.shipiit.com/
site_author: Rahul Raj

repo_name: shipiit/shipit_agent
repo_url: https://github.com/shipiit/shipit_agent
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2026 SHIPIT Agent contributors

theme:
  name: material
  language: en
  logo: assets/logo.svg
  favicon: assets/logo.svg
  custom_dir: docs/overrides
  palette:
    # Dark mode first — matches Anthropic docs aesthetic
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    # Light mode — clean white header like Anthropic
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - content.action.view
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.critic
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde

plugins:
  - search:
      lang: en
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
      fallback_to_build_date: true
  # Auto-generate OpenGraph preview cards for every page so links shared
  # on Twitter/X, Slack, LinkedIn, and Discord render with a branded image
  # showing the page title + site name. Requires the imaging extras:
  #     pip install 'mkdocs-material[imaging]'
  # plus Cairo system libraries (macOS: brew install cairo freetype libffi).
  # The plugin auto-disables itself if dependencies are missing, so it
  # never breaks the build.
  - social:
      cards: !ENV [MKDOCS_SOCIAL_CARDS, true]
      cards_layout_options:
        background_color: "#1a1a2e"
        color: "#ffffff"
        font_family: Inter

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/toc-toggle.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/shipiit/shipit_agent
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/shipit-agent/

